<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='8' y1='6' x2='58' y2='62'%3E%3Cstop stop-color='%23f6dfcf'/%3E%3Cstop offset='1' stop-color='%238f5f51'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='4' y='4' width='56' height='56' rx='16' fill='url(%23g)'/%3E%3Cpath d='M20 22h19a8 8 0 0 1 0 16H25a7 7 0 0 0 0 14h15' fill='none' stroke='%232f2523' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='45' cy='22' r='4' fill='%238f3155'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #101418;
      --panel: #171d22;
      --panel-border: #28323a;
      --text: #edf7f0;
      --muted: #98a6a0;
      --snake: #39ff88;
      --snake-head: #b7ffd4;
      --snake-shadow: rgba(57, 255, 136, 0.45);
      --food: #ff3d4f;
      --food-shadow: rgba(255, 61, 79, 0.7);
      --grid: rgba(255, 255, 255, 0.045);
      --shadow: rgba(0, 0, 0, 0.4);
      --page-glow: rgba(57, 255, 136, 0.12);
      --board-bg: #0a0e11;
      --button-bg: #1c242a;
      --button-text: var(--text);
      --primary-button-bg: var(--snake);
      --primary-button-text: #07100b;
      --overlay-bg: rgba(10, 14, 17, 0.78);
      --dialog-bg: #141a1f;
      --board-size: min(94vw, 680px, calc(100svh - 230px));
    }

    :root[data-theme="aesthetic"] {
      --bg: #f3e7dd;
      --panel: #fffaf6;
      --panel-border: #d9b8a7;
      --text: #302624;
      --muted: #755f59;
      --snake: #b97761;
      --snake-head: #f1c7b5;
      --snake-shadow: rgba(185, 119, 97, 0.42);
      --food: #8f3155;
      --food-shadow: rgba(143, 49, 85, 0.42);
      --grid: rgba(82, 54, 47, 0.1);
      --shadow: rgba(74, 47, 39, 0.18);
      --page-glow: rgba(185, 119, 97, 0.22);
      --board-bg: #fff8f2;
      --button-bg: #f6e7dc;
      --button-text: #302624;
      --primary-button-bg: #b97761;
      --primary-button-text: #fffaf6;
      --overlay-bg: rgba(243, 231, 221, 0.78);
      --dialog-bg: #fffaf6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top, var(--page-glow), transparent 32rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background-color 180ms ease, color 180ms ease;
    }

    .game-shell {
      width: min(96vw, 860px);
      min-height: 100vh;
      min-height: 100svh;
      padding: clamp(10px, 2vh, 20px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: clamp(8px, 1.5vh, 14px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: clamp(44px, 9vw, 62px);
      height: clamp(44px, 9vw, 62px);
      flex: 0 0 auto;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 40px var(--shadow);
      color: var(--snake);
      transition: background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease, color 180ms ease;
    }

    .brand-mark .snake-path {
      fill: none;
      stroke: currentColor;
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-mark .snake-eye {
      fill: var(--food);
    }

    .brand-copy {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(0.78rem, 2vw, 0.95rem);
    }

    .scoreboard {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .score-card {
      min-width: 96px;
      padding: 9px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 40px var(--shadow);
      text-align: right;
      transition: background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .score-label {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-value {
      display: block;
      margin-top: 2px;
      font-size: clamp(1.25rem, 3vw, 1.7rem);
      font-weight: 800;
      color: var(--snake);
      line-height: 1;
    }

    .board-wrap {
      position: relative;
      width: clamp(220px, var(--board-size), 680px);
      aspect-ratio: 1 / 1;
      justify-self: center;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--board-bg);
      box-shadow: 0 24px 80px var(--shadow);
      transition: background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      width: min(100%, 680px);
      justify-self: center;
    }

    .status-line {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .actions {
      display: flex;
      justify-content: end;
      gap: 8px;
    }

    .action-button,
    .pad-button {
      width: auto;
      min-height: 42px;
      border: 1px solid var(--panel-border);
      background: var(--button-bg);
      color: var(--button-text);
    }

    .action-button {
      min-width: 92px;
      padding: 0 14px;
    }

    .theme-button {
      width: 42px;
      min-width: 42px;
      padding: 0;
    }

    .theme-button svg {
      width: 20px;
      height: 20px;
      display: block;
      margin: auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .theme-button .theme-icon-warm {
      display: none;
    }

    :root[data-theme="aesthetic"] .theme-icon-dark {
      display: none;
    }

    :root[data-theme="aesthetic"] .theme-icon-warm {
      display: block;
    }

    .sound-button {
      width: 42px;
      min-width: 42px;
      padding: 0;
    }

    .sound-button svg {
      width: 20px;
      height: 20px;
      display: block;
      margin: auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sound-muted-mark {
      display: none;
    }

    :root[data-sound="off"] .sound-wave {
      display: none;
    }

    :root[data-sound="off"] .sound-muted-mark {
      display: block;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 42px);
      grid-template-rows: repeat(2, 42px);
      gap: 6px;
    }

    .pad-button {
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      line-height: 1;
    }

    .pad-button[data-direction="up"] {
      grid-column: 2;
    }

    .pad-button[data-direction="left"] {
      grid-column: 1;
      grid-row: 2;
    }

    .pad-button[data-direction="down"] {
      grid-column: 2;
      grid-row: 2;
    }

    .pad-button[data-direction="right"] {
      grid-column: 3;
      grid-row: 2;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: var(--overlay-bg);
      backdrop-filter: blur(6px);
    }

    .overlay.is-visible {
      display: grid;
    }

    .dialog {
      width: min(92%, 360px);
      padding: 26px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--dialog-bg);
      text-align: center;
      box-shadow: 0 18px 60px var(--shadow);
    }

    .dialog h2 {
      margin: 0 0 8px;
      color: var(--food);
      font-size: 2rem;
      line-height: 1;
    }

    .dialog p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--primary-button-bg);
      color: var(--primary-button-text);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: transform 140ms ease, filter 140ms ease, background-color 180ms ease, color 180ms ease;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.35) brightness(0.75);
      transform: none;
    }

    .action-button,
    .pad-button {
      width: auto;
      border: 1px solid var(--panel-border);
      background: var(--button-bg);
      color: var(--button-text);
    }

    .action-button {
      min-width: 92px;
      padding: 0 14px;
    }

    @media (max-height: 760px) {
      :root {
        --board-size: min(92vw, calc(100svh - 190px));
      }

      h1 {
        font-size: clamp(1.45rem, 4vw, 2.2rem);
      }

      .hint {
        margin-top: 4px;
      }

      .score-card {
        padding: 7px 10px;
      }

      .controls {
        gap: 8px;
      }

      .dpad {
        grid-template-columns: repeat(3, 36px);
        grid-template-rows: repeat(2, 36px);
      }

      .action-button,
      .pad-button {
        min-height: 36px;
      }
    }

    @media (max-width: 640px) {
      body {
        place-items: start center;
        overflow: auto;
      }

      :root {
        --board-size: min(94vw, calc(100svh - 260px));
      }

      .game-shell {
        width: 100%;
        padding: 12px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .brand {
        gap: 10px;
      }

      .scoreboard {
        justify-content: stretch;
      }

      .score-card {
        flex: 1;
        text-align: left;
      }

      .controls {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .status-line,
      .actions {
        width: 100%;
      }

      .actions {
        justify-content: stretch;
      }

      .action-button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Snake game">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 72 72" aria-hidden="true">
          <path class="snake-path" d="M18 22h28a10 10 0 0 1 0 20H28a8 8 0 0 0 0 16h24" />
          <circle class="snake-eye" cx="51" cy="22" r="4" />
        </svg>
        <div class="brand-copy">
          <h1>Snake</h1>
        <p class="hint">Arrow keys, WASD, swipe, or tap the pad. Space pauses.</p>
        </div>
      </div>

      <section class="scoreboard" aria-label="Scoreboard">
        <div class="score-card">
          <span class="score-label">Score</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-card">
          <span class="score-label">High</span>
          <span class="score-value" id="highScore">0</span>
        </div>
        <div class="score-card">
          <span class="score-label">Level</span>
          <span class="score-value" id="level">1</span>
        </div>
      </section>
    </header>

    <section class="board-wrap">
      <canvas id="game" width="600" height="600" aria-label="Snake game board"></canvas>

      <div class="overlay" id="gameOverOverlay" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <div class="dialog">
          <h2 id="gameOverTitle">Game Over</h2>
          <p id="finalScore">Score: 0</p>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Game controls">
      <div class="status-line" id="statusLine">Ready</div>

      <div class="dpad" aria-label="Movement pad">
        <button class="pad-button" type="button" data-direction="up" aria-label="Move up">▲</button>
        <button class="pad-button" type="button" data-direction="left" aria-label="Move left">◀</button>
        <button class="pad-button" type="button" data-direction="down" aria-label="Move down">▼</button>
        <button class="pad-button" type="button" data-direction="right" aria-label="Move right">▶</button>
      </div>

      <div class="actions">
        <button class="action-button sound-button" id="soundButton" type="button" aria-label="Mute sound" title="Mute sound" aria-pressed="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10v4h4l5 4V6l-5 4H4z" />
            <path class="sound-wave" d="M16 9.5a4 4 0 0 1 0 5" />
            <path class="sound-wave" d="M18.5 7a7.5 7.5 0 0 1 0 10" />
            <path class="sound-muted-mark" d="M17 9l4 4" />
            <path class="sound-muted-mark" d="M21 9l-4 4" />
          </svg>
        </button>
        <button class="action-button theme-button" id="themeButton" type="button" aria-label="Switch to warm theme" title="Switch theme" aria-pressed="false">
          <svg class="theme-icon-dark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v2" />
            <path d="M12 19v2" />
            <path d="M4.22 4.22l1.42 1.42" />
            <path d="M18.36 18.36l1.42 1.42" />
            <path d="M3 12h2" />
            <path d="M19 12h2" />
            <path d="M4.22 19.78l1.42-1.42" />
            <path d="M18.36 5.64l1.42-1.42" />
            <circle cx="12" cy="12" r="4" />
          </svg>
          <svg class="theme-icon-warm" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 12.5A7.5 7.5 0 0 1 9.5 2a8.7 8.7 0 1 0 10.5 10.5z" />
          </svg>
        </button>
        <button class="action-button" id="pauseButton" type="button">Pause</button>
        <button class="action-button" id="quickRestartButton" type="button">Restart</button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highScore");
    const levelEl = document.getElementById("level");
    const statusLine = document.getElementById("statusLine");
    const overlay = document.getElementById("gameOverOverlay");
    const finalScoreEl = document.getElementById("finalScore");
    const restartButton = document.getElementById("restartButton");
    const quickRestartButton = document.getElementById("quickRestartButton");
    const pauseButton = document.getElementById("pauseButton");
    const soundButton = document.getElementById("soundButton");
    const themeButton = document.getElementById("themeButton");
    const padButtons = document.querySelectorAll(".pad-button");

    const gridCells = 24;
    const startDelay = 118;
    const fastestDelay = 58;
    const highScoreKey = "snakeHighScore";
    const themeKey = "snakeTheme";
    const soundKey = "snakeSound";
    const foodKinds = ["apple", "berry", "gem"];

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let highScore;
    let level;
    let gameTimer;
    let gameOver;
    let isPaused;
    let boardPixels = 600;
    let cellSize = boardPixels / gridCells;
    let touchStart = null;
    let audioContext = null;
    let soundEnabled = true;
    let audioUnlocked = false;
    let playedReadySound = false;

    function loadHighScore() {
      try {
        return Number(localStorage.getItem(highScoreKey)) || 0;
      } catch {
        return 0;
      }
    }

    function saveHighScore(value) {
      try {
        localStorage.setItem(highScoreKey, String(value));
      } catch {
        // Private browsing or storage limits should not break the game.
      }
    }

    function loadTheme() {
      try {
        return localStorage.getItem(themeKey) === "aesthetic" ? "aesthetic" : "dark";
      } catch {
        return "dark";
      }
    }

    function saveTheme(theme) {
      try {
        localStorage.setItem(themeKey, theme);
      } catch {
        // Theme persistence is optional.
      }
    }

    function applyTheme(theme) {
      const isAesthetic = theme === "aesthetic";
      document.documentElement.dataset.theme = isAesthetic ? "aesthetic" : "dark";
      themeButton.setAttribute("aria-label", isAesthetic ? "Switch to dark theme" : "Switch to warm theme");
      themeButton.title = isAesthetic ? "Switch to dark theme" : "Switch to warm theme";
      themeButton.setAttribute("aria-pressed", String(isAesthetic));
      saveTheme(isAesthetic ? "aesthetic" : "dark");
      draw();
    }

    function themeColor(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function loadSoundPreference() {
      try {
        return localStorage.getItem(soundKey) !== "off";
      } catch {
        return true;
      }
    }

    function saveSoundPreference() {
      try {
        localStorage.setItem(soundKey, soundEnabled ? "on" : "off");
      } catch {
        // Sound persistence is optional.
      }
    }

    function updateSoundButton() {
      document.documentElement.dataset.sound = soundEnabled ? "on" : "off";
      soundButton.setAttribute("aria-pressed", String(soundEnabled));
      soundButton.setAttribute("aria-label", soundEnabled ? "Mute sound" : "Unmute sound");
      soundButton.title = soundEnabled ? "Mute sound" : "Unmute sound";
    }

    function unlockAudio() {
      if (!soundEnabled) {
        return null;
      }

      const AudioEngine = window.AudioContext || window.webkitAudioContext;

      if (!AudioEngine) {
        return null;
      }

      if (!audioContext) {
        audioContext = new AudioEngine();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }

      audioUnlocked = true;
      return audioContext;
    }

    function playTone(frequency, duration, type = "sine", volume = 0.12, delay = 0) {
      if (!soundEnabled) {
        return;
      }

      const engine = unlockAudio();

      if (!engine) {
        return;
      }

      const startAt = engine.currentTime + delay;
      const oscillator = engine.createOscillator();
      const gain = engine.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startAt);
      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

      oscillator.connect(gain);
      gain.connect(engine.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + duration + 0.02);
    }

    function playSound(name) {
      if (name === "turn") {
        playTone(380, 0.045, "triangle", 0.08);
      } else if (name === "eat") {
        playTone(560, 0.09, "sine", 0.16);
        playTone(820, 0.1, "sine", 0.12, 0.055);
      } else if (name === "level") {
        playTone(640, 0.08, "triangle", 0.14);
        playTone(860, 0.1, "triangle", 0.12, 0.07);
        playTone(1080, 0.12, "triangle", 0.1, 0.15);
      } else if (name === "gameOver") {
        playTone(220, 0.14, "sawtooth", 0.12);
        playTone(155, 0.2, "sawtooth", 0.1, 0.12);
      } else if (name === "pause") {
        playTone(280, 0.08, "square", 0.08);
      } else if (name === "restart") {
        playTone(440, 0.08, "triangle", 0.12);
        playTone(660, 0.09, "triangle", 0.1, 0.06);
      } else if (name === "ready") {
        playTone(520, 0.07, "sine", 0.1);
      }
    }

    function primeAudio() {
      if (!soundEnabled || playedReadySound) {
        return;
      }

      unlockAudio();
      playedReadySound = true;
      playSound("ready");
    }

    function resetGame(playRestartSound = true) {
      if (playRestartSound) {
        playSound("restart");
      }

      snake = [
        { x: 12, y: 12 },
        { x: 11, y: 12 },
        { x: 10, y: 12 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      highScore = loadHighScore();
      level = 1;
      gameOver = false;
      isPaused = false;
      scoreEl.textContent = score;
      highScoreEl.textContent = highScore;
      levelEl.textContent = level;
      pauseButton.textContent = "Pause";
      pauseButton.disabled = false;
      overlay.classList.remove("is-visible");
      placeFood();
      draw();
      scheduleNextTick();
      updateStatus();
    }

    function placeFood() {
      if (snake.length >= gridCells * gridCells) {
        endGame("Board cleared");
        return;
      }

      do {
        food = {
          x: Math.floor(Math.random() * gridCells),
          y: Math.floor(Math.random() * gridCells),
          kind: foodKinds[Math.floor(Math.random() * foodKinds.length)]
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function scheduleNextTick() {
      clearTimeout(gameTimer);

      if (!gameOver && !isPaused) {
        gameTimer = setTimeout(update, currentDelay());
      }
    }

    function currentDelay() {
      return Math.max(fastestDelay, startDelay - (level - 1) * 8);
    }

    function updateLevel() {
      const nextLevel = Math.floor(score / 50) + 1;

      if (nextLevel !== level) {
        level = nextLevel;
        levelEl.textContent = level;
        playSound("level");
      }
    }

    function updateStatus() {
      if (gameOver) {
        statusLine.textContent = "Game over";
      } else if (isPaused) {
        statusLine.textContent = "Paused";
      } else {
        const cellsPerSecond = (1000 / currentDelay()).toFixed(1);
        statusLine.textContent = `Level ${level} - ${cellsPerSecond} cells/sec`;
      }
    }

    function update() {
      if (gameOver || isPaused) {
        return;
      }

      // Direction changes are applied once per tick so quick key presses remain grid-safe.
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const willEat = head.x === food.x && head.y === food.y;

      if (hasHitWall(head) || hasHitBody(head, willEat)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (willEat) {
        score += 10;
        scoreEl.textContent = score;
        playSound("eat");
        updateLevel();

        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          saveHighScore(highScore);
        }

        placeFood();
      } else {
        snake.pop();
      }

      draw();
      updateStatus();
      scheduleNextTick();
    }

    function hasHitWall(head) {
      return head.x < 0 || head.x >= gridCells || head.y < 0 || head.y >= gridCells;
    }

    function hasHitBody(head, willEat) {
      const bodyToCheck = willEat ? snake : snake.slice(0, -1);
      return bodyToCheck.some(segment => segment.x === head.x && segment.y === head.y);
    }

    function endGame(title = "Game Over") {
      gameOver = true;
      clearTimeout(gameTimer);
      playSound("gameOver");
      pauseButton.disabled = true;
      document.getElementById("gameOverTitle").textContent = title;
      finalScoreEl.textContent = `Score: ${score} | Level: ${level}`;
      overlay.classList.add("is-visible");
      restartButton.focus();
      draw();
      updateStatus();
    }

    function togglePause() {
      if (gameOver) {
        return;
      }

      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? "Resume" : "Pause";
      playSound("pause");
      updateStatus();

      if (isPaused) {
        clearTimeout(gameTimer);
      } else {
        scheduleNextTick();
      }
    }

    function draw() {
      ctx.fillStyle = themeColor("--board-bg");
      ctx.fillRect(0, 0, boardPixels, boardPixels);

      if (!snake || !food) {
        return;
      }

      drawGrid();
      drawFood();
      drawSnake();
    }

    function drawGrid() {
      ctx.strokeStyle = themeColor("--grid");
      ctx.lineWidth = 1;

      for (let i = 0; i <= gridCells; i++) {
        const position = i * cellSize;
        ctx.beginPath();
        ctx.moveTo(position, 0);
        ctx.lineTo(position, boardPixels);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, position);
        ctx.lineTo(boardPixels, position);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const inset = index === 0 ? cellSize * 0.12 : cellSize * 0.16;
        ctx.fillStyle = index === 0 ? themeColor("--snake-head") : themeColor("--snake");
        ctx.shadowColor = themeColor("--snake-shadow");
        ctx.shadowBlur = index === 0 ? 18 : 10;
        roundRect(
          segment.x * cellSize + inset,
          segment.y * cellSize + inset,
          cellSize - inset * 2,
          cellSize - inset * 2,
          cellSize * 0.25
        );
        ctx.fill();
      });

      ctx.shadowBlur = 0;
    }

    function drawFood() {
      const centerX = food.x * cellSize + cellSize / 2;
      const centerY = food.y * cellSize + cellSize / 2;
      const radius = cellSize * 0.34;

      ctx.fillStyle = themeColor("--food");
      ctx.shadowColor = themeColor("--food-shadow");
      ctx.shadowBlur = 18;

      if (food.kind === "berry") {
        drawBerry(centerX, centerY, radius);
      } else if (food.kind === "gem") {
        drawGem(centerX, centerY, radius);
      } else {
        drawApple(centerX, centerY, radius);
      }

      ctx.shadowBlur = 0;
    }

    function drawApple(centerX, centerY, radius) {
      ctx.beginPath();
      ctx.moveTo(centerX, centerY + radius * 0.78);
      ctx.bezierCurveTo(
        centerX - radius * 1.05,
        centerY + radius * 0.25,
        centerX - radius * 0.78,
        centerY - radius * 0.75,
        centerX - radius * 0.22,
        centerY - radius * 0.45
      );
      ctx.bezierCurveTo(
        centerX,
        centerY - radius * 0.66,
        centerX + radius * 0.22,
        centerY - radius * 0.66,
        centerX + radius * 0.44,
        centerY - radius * 0.45
      );
      ctx.bezierCurveTo(
        centerX + radius * 0.96,
        centerY - radius * 0.75,
        centerX + radius * 1.08,
        centerY + radius * 0.22,
        centerX,
        centerY + radius * 0.78
      );
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = themeColor("--snake");
      ctx.lineWidth = Math.max(2, cellSize * 0.08);
      ctx.beginPath();
      ctx.moveTo(centerX + radius * 0.1, centerY - radius * 0.55);
      ctx.quadraticCurveTo(centerX + radius * 0.32, centerY - radius * 1.02, centerX + radius * 0.68, centerY - radius * 0.82);
      ctx.stroke();
    }

    function drawBerry(centerX, centerY, radius) {
      const small = radius * 0.52;
      const points = [
        [centerX - radius * 0.36, centerY - radius * 0.22],
        [centerX + radius * 0.35, centerY - radius * 0.2],
        [centerX, centerY + radius * 0.38]
      ];

      points.forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x, y, small, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.shadowBlur = 0;
      ctx.fillStyle = themeColor("--snake-head");
      ctx.beginPath();
      ctx.ellipse(centerX, centerY - radius * 0.82, radius * 0.35, radius * 0.18, -0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGem(centerX, centerY, radius) {
      ctx.beginPath();
      ctx.moveTo(centerX, centerY - radius);
      ctx.lineTo(centerX + radius, centerY - radius * 0.2);
      ctx.lineTo(centerX + radius * 0.62, centerY + radius);
      ctx.lineTo(centerX - radius * 0.62, centerY + radius);
      ctx.lineTo(centerX - radius, centerY - radius * 0.2);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = themeColor("--snake-head");
      ctx.lineWidth = Math.max(1.5, cellSize * 0.06);
      ctx.beginPath();
      ctx.moveTo(centerX - radius * 0.5, centerY - radius * 0.2);
      ctx.lineTo(centerX, centerY + radius * 0.65);
      ctx.lineTo(centerX + radius * 0.5, centerY - radius * 0.2);
      ctx.stroke();
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const size = Math.floor(Math.min(rect.width, rect.height));

      if (!size) {
        return;
      }

      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      boardPixels = size;
      cellSize = boardPixels / gridCells;
      canvas.width = Math.round(boardPixels * dpr);
      canvas.height = Math.round(boardPixels * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function changeDirection(newDirection) {
      const isReverse =
        newDirection.x + direction.x === 0 &&
        newDirection.y + direction.y === 0;

      if (!isReverse) {
        nextDirection = newDirection;
        playSound("turn");
        return true;
      }

      return false;
    }

    function handleDirectionInput(name) {
      const directions = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };

      unlockAudio();
      changeDirection(directions[name]);
    }

    window.addEventListener("keydown", event => {
      const keyMap = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        w: { x: 0, y: -1 },
        s: { x: 0, y: 1 },
        a: { x: -1, y: 0 },
        d: { x: 1, y: 0 }
      };

      if (event.code === "Space") {
        event.preventDefault();
        unlockAudio();
        togglePause();
        return;
      }

      if (event.key.toLowerCase() === "r") {
        event.preventDefault();
        unlockAudio();
        resetGame();
        return;
      }

      const selectedDirection = keyMap[event.key] || keyMap[event.key.toLowerCase()];

      if (selectedDirection) {
        event.preventDefault();
        unlockAudio();
        changeDirection(selectedDirection);
      }
    });

    padButtons.forEach(button => {
      button.addEventListener("pointerdown", event => {
        event.preventDefault();
        handleDirectionInput(button.dataset.direction);
      });
    });

    canvas.addEventListener("pointerdown", event => {
      unlockAudio();
      touchStart = { x: event.clientX, y: event.clientY };
    });

    canvas.addEventListener("pointerup", event => {
      if (!touchStart) {
        return;
      }

      const deltaX = event.clientX - touchStart.x;
      const deltaY = event.clientY - touchStart.y;
      touchStart = null;

      if (Math.max(Math.abs(deltaX), Math.abs(deltaY)) < 24) {
        return;
      }

      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        handleDirectionInput(deltaX > 0 ? "right" : "left");
      } else {
        handleDirectionInput(deltaY > 0 ? "down" : "up");
      }
    });

    if ("ResizeObserver" in window) {
      new ResizeObserver(resizeCanvas).observe(canvas.parentElement);
    }

    document.addEventListener("pointerdown", primeAudio, { capture: true });
    document.addEventListener("keydown", primeAudio, { capture: true });
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("load", resizeCanvas);
    pauseButton.addEventListener("click", togglePause);
    soundButton.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      saveSoundPreference();
      updateSoundButton();

      if (soundEnabled) {
        unlockAudio();
        playSound("restart");
      }
    });
    themeButton.addEventListener("click", () => {
      const nextTheme = document.documentElement.dataset.theme === "aesthetic" ? "dark" : "aesthetic";
      applyTheme(nextTheme);
    });
    restartButton.addEventListener("click", resetGame);
    quickRestartButton.addEventListener("click", resetGame);

    soundEnabled = loadSoundPreference();
    updateSoundButton();
    applyTheme(loadTheme());
    resetGame(false);
  </script>
</body>
</html>
